<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Economy</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      background: #1a1a1a;
      color: #e8e8e8;
      width: 300px;
      min-height: 400px;
      padding: 0;
      overflow: hidden;
      user-select: none;
      -webkit-app-region: drag;
    }

    .header {
      background: #111;
      padding: 16px 20px 12px;
      border-bottom: 1px solid #2a2a2a;
    }

    .header h1 {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 8px;
    }

    .today-cost {
      font-size: 36px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.02em;
      line-height: 1;
    }

    .today-label {
      font-size: 11px;
      color: #555;
      margin-top: 4px;
    }

    .stats {
      padding: 12px 20px;
      border-bottom: 1px solid #2a2a2a;
      display: flex;
      gap: 24px;
    }

    .stat {
      flex: 1;
    }

    .stat-value {
      font-size: 18px;
      font-weight: 600;
      color: #ddd;
    }

    .stat-label {
      font-size: 10px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-top: 2px;
    }

    .sync-row {
      padding: 10px 20px;
      border-bottom: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sync-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #3a7;
      flex-shrink: 0;
    }

    .sync-dot.syncing {
      background: #a73;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .sync-text {
      font-size: 11px;
      color: #666;
      flex: 1;
    }

    .actions {
      padding: 12px 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      -webkit-app-region: no-drag;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 9px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      text-align: center;
      transition: opacity 0.15s, background 0.15s;
    }

    .btn:active { opacity: 0.7; }
    .btn:disabled { opacity: 0.4; cursor: default; }

    .btn-primary {
      background: #2563eb;
      color: #fff;
    }

    .btn-primary:hover:not(:disabled) { background: #1d4ed8; }

    .btn-secondary {
      background: #2a2a2a;
      color: #ccc;
    }

    .btn-secondary:hover:not(:disabled) { background: #333; }

    .btn-danger {
      background: transparent;
      color: #666;
      font-size: 12px;
    }

    .btn-danger:hover { color: #e05; }

    .loading {
      color: #555;
      font-size: 12px;
      padding: 20px;
      text-align: center;
    }

    #error-msg {
      padding: 8px 20px;
      font-size: 11px;
      color: #e55;
      display: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Economy</h1>
    <div class="today-cost" id="today-cost">$0.00</div>
    <div class="today-label">today</div>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-value" id="week-cost">$0.00</div>
      <div class="stat-label">This Week</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="month-cost">$0.00</div>
      <div class="stat-label">This Month</div>
    </div>
  </div>

  <div class="sync-row">
    <div class="sync-dot" id="sync-dot"></div>
    <div class="sync-text" id="sync-text">Last sync: never</div>
  </div>

  <div id="error-msg"></div>

  <div class="actions">
    <button class="btn btn-primary" id="btn-sync">Sync Now</button>
    <button class="btn btn-secondary" id="btn-dashboard">Open Dashboard</button>
    <button class="btn btn-danger" id="btn-quit">Quit</button>
  </div>

  <script>
    const api = window.economy

    function fmt(usd) {
      if (usd === undefined || usd === null) return '$—'
      return '$' + Number(usd).toFixed(2)
    }

    function showError(msg) {
      const el = document.getElementById('error-msg')
      el.textContent = msg
      el.style.display = 'block'
      setTimeout(() => { el.style.display = 'none' }, 4000)
    }

    function updateStats(stats) {
      if (stats.today != null) document.getElementById('today-cost').textContent = fmt(stats.today)
      if (stats.week != null) document.getElementById('week-cost').textContent = fmt(stats.week)
      if (stats.month != null) document.getElementById('month-cost').textContent = fmt(stats.month)
      if (stats.lastSync) {
        const d = new Date(stats.lastSync)
        const diff = Math.round((Date.now() - d.getTime()) / 1000)
        let label
        if (diff < 60) label = 'just now'
        else if (diff < 3600) label = Math.round(diff / 60) + 'm ago'
        else label = Math.round(diff / 3600) + 'h ago'
        document.getElementById('sync-text').textContent = 'Last sync: ' + label
      }
    }

    if (api) {
      api.onStats((stats) => updateStats(stats))
    }

    document.getElementById('btn-sync').addEventListener('click', async () => {
      const btn = document.getElementById('btn-sync')
      const dot = document.getElementById('sync-dot')
      btn.disabled = true
      btn.textContent = 'Syncing…'
      dot.classList.add('syncing')
      document.getElementById('sync-text').textContent = 'Syncing…'
      try {
        await api.syncNow()
        document.getElementById('sync-text').textContent = 'Sync complete'
      } catch (e) {
        showError('Sync failed: ' + e.message)
      } finally {
        btn.disabled = false
        btn.textContent = 'Sync Now'
        dot.classList.remove('syncing')
      }
    })

    document.getElementById('btn-dashboard').addEventListener('click', () => {
      api.openDashboard()
    })

    document.getElementById('btn-quit').addEventListener('click', () => {
      api.quit()
    })
  </script>
</body>
</html>
